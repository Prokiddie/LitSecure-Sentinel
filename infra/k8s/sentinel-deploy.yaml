apiVersion: v1
kind: Namespace
metadata:
  name: litsecure
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sentinel-config
  namespace: litsecure
data:
  NODE_ENV: "production"
  PORT: "3000"
  DATABASE_URL: "postgresql://postgres.your-supabase-project:yourpassword@aws-0-us-east-1.pooler.supabase.com:6543/postgres?pgpool=true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinel-deployment
  namespace: litsecure
  labels:
    app: sentinel
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: sentinel
  template:
    metadata:
      labels:
        app: sentinel
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: sentinel-app
          image: litsecure-sentinel:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: sentinel-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: jwt-secret
            - name: REFRESH_TOKEN_SECRET
              valueFrom:
                secretKeyRef:
                  name: sentinel-secrets
                  key: refresh-token-secret
          resources:
            limits:
              cpu: "1000m"
              memory: "1Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # Allow write to /app/data and /app/uploads
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/live  # Verify it's ready to handle traffic
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: sentinel-service
  namespace: litsecure
  labels:
    app: sentinel
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: sentinel
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sentinel-ingress
  namespace: litsecure
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "sentinel-service"
spec:
  tls:
    - hosts:
        - sentinel.litsecure.gov
      secretName: litsecure-tls-certs
  rules:
    - host: sentinel.litsecure.gov
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sentinel-service
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sentinel-hpa
  namespace: litsecure
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sentinel-deployment
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 75
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
