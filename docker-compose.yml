version: "3.9"

services:
  sentinel:
    build: .
    container_name: litsecure-sentinel
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.local          # Load all secrets from .env.local (never hardcode in compose)
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      # SQLite fallback persistence (remove once fully on PostgreSQL)
      - sentinel_data:/app/data
      # Uploaded evidence files
      - sentinel_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M
    security_opt:
      - no-new-privileges:true
    read_only: false           # Set to true once data/uploads are on named volumes
    tmpfs:
      - /tmp

volumes:
  sentinel_data:
    driver: local
  sentinel_uploads:
    driver: local
