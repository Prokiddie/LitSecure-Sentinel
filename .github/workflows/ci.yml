name: LitSecure Sentinel — CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  IMAGE_NAME: litsecure-sentinel

# ══════════════════════════════════════════════════════════════════════════════
# Stage 1 — SAST + Dependency Audit
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  security-scan:
    name: 🔐 SAST + Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run lint

      - name: npm audit (high+critical only)
        run: npm audit --audit-level=high
        continue-on-error: true   # Report but don't block on transitive deps

      - name: Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/owasp-top-ten
            p/express
            p/jwt
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true   # Report findings; don't block CI yet

      - name: Secret scanning (gitleaks)
        uses: zricethezav/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true   # Report findings; history may contain old placeholders

# ══════════════════════════════════════════════════════════════════════════════
# Stage 2 — Unit + Integration Tests
# ══════════════════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          # Placeholder secrets for CI — no real credentials
          JWT_SECRET: ci-test-jwt-secret-32-chars-minimum!!
          REFRESH_TOKEN_SECRET: ci-test-refresh-secret-32-chars-min!
          ENCRYPTION_KEY: ci-test-encryption-key-32-chars-min!!
          JWT_EXPIRY: 1h
          DATABASE_PATH: ":memory:"
          # Intentionally left blank — disables Supabase/PostgreSQL in test mode
          SUPABASE_URL: ''
          SUPABASE_ANON_KEY: ''
          SUPABASE_SERVICE_KEY: ''
          SUPABASE_DB_URL: ''
          GEMINI_API_KEY: ''
          VIRUSTOTAL_API_KEY: ''

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

# ══════════════════════════════════════════════════════════════════════════════
# Stage 3 — Docker Build + Container Vulnerability Scan
# ══════════════════════════════════════════════════════════════════════════════
  build-and-scan:
    name: 🐳 Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      security-events: write   # Required for SARIF upload to GitHub Security tab

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Step A — Upload ALL findings (HIGH + CRITICAL) to GitHub Security tab
      - name: Trivy scan → GitHub Security tab (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'           # Never block — just report

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container

      # Step B — Hard-fail ONLY on CRITICAL (not HIGH) with fixable patches
      - name: Trivy scan → fail on CRITICAL with fix available
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: table
          severity: CRITICAL
          exit-code: '1'           # Block the pipeline on unfixed CRITICAL CVEs
          ignore-unfixed: true     # Only flag CVEs that have a patch available

      - name: Save image as artifact
        if: github.ref == 'refs/heads/main'
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload image artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.sha }}
          path: image.tar.gz
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# Stage 4 — Deploy to Staging (main branch only)
# ══════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.sentinel.litsecure.mw
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ github.sha }}

      - name: Deploy to staging server (SSH)
        # Configure via GitHub Environment secrets:
        #   STAGING_HOST, STAGING_USER, STAGING_SSH_KEY
        run: |
          echo "Deploying ${{ env.IMAGE_NAME }}:${{ github.sha }} to staging"
          echo "Set STAGING_HOST, STAGING_USER, STAGING_SSH_KEY in GitHub Environment secrets to enable SSH deploy"
        # Uncomment and configure when staging infra is ready:
        # uses: appleboy/ssh-action@v1.0.3
        # with:
        #   host: ${{ secrets.STAGING_HOST }}
        #   username: ${{ secrets.STAGING_USER }}
        #   key: ${{ secrets.STAGING_SSH_KEY }}
        #   script: |
        #     docker load < image.tar.gz
        #     docker-compose -f /opt/litsecure/docker-compose.yml up -d --force-recreate

      - name: Smoke test staging
        # Skip smoke test if staging host is not yet configured
        run: |
          if [ -n "${{ secrets.STAGING_HOST }}" ]; then
            sleep 15
            curl -f https://staging.sentinel.litsecure.mw/api/health || exit 1
          else
            echo "⏭ Staging host not configured — skipping smoke test"
          fi

# ══════════════════════════════════════════════════════════════════════════════
# Stage 5 — Production Deploy (manual approval gate)
# ══════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: 🏭 Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production            # Requires manual approval in GitHub Environments
      url: https://sentinel.litsecure.mw
    steps:
      - uses: actions/checkout@v4

      - name: Tag release
        run: |
          git config user.email "ci@litsecure.mw"
          git config user.name  "LitSecure CI"
          git tag "v$(node -p "require('./package.json').version")-$(date +%Y%m%d%H%M)" || true
          git push origin --tags || true

      - name: Deploy to production
        run: |
          echo "Deploying to PRODUCTION — version ${{ github.sha }}"
          echo "Set PRODUCTION_HOST, PRODUCTION_USER, PRODUCTION_SSH_KEY in GitHub Environment secrets"
        # Uncomment when production infra is ready:
        # uses: appleboy/ssh-action@v1.0.3
        # with:
        #   host: ${{ secrets.PRODUCTION_HOST }}
        #   username: ${{ secrets.PRODUCTION_USER }}
        #   key: ${{ secrets.PRODUCTION_SSH_KEY }}
        #   script: |
        #     docker load < image.tar.gz
        #     docker-compose -f /opt/litsecure/docker-compose.yml up -d --force-recreate

      - name: Production health check
        run: |
          if [ -n "${{ secrets.PRODUCTION_HOST }}" ]; then
            sleep 20
            curl -f https://sentinel.litsecure.mw/api/health || exit 1
          else
            echo "⏭ Production host not configured — skipping health check"
          fi

      - name: Notify on success
        if: success()
        run: echo "✅ Production deployment pipeline completed"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "🚨 Production deploy FAILED — initiate manual rollback or revert commit"
          exit 1
