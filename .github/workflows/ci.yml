name: LitSecure Sentinel — CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  IMAGE_NAME: litsecure-sentinel

# ══════════════════════════════════════════════════════════════════════════════
# Stage 1 — SAST + Dependency Audit
# ══════════════════════════════════════════════════════════════════════════════
jobs:
  security-scan:
    name: 🔐 SAST + Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run lint

      - name: npm audit (high+critical only)
        run: npm audit --audit-level=high
        continue-on-error: true   # Report but don't block on transitive deps

      - name: Semgrep SAST scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/typescript
            p/nodejs
            p/owasp-top-ten
            p/express
            p/jwt
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true   # Report findings; don't block CI yet

      - name: Secret scanning (gitleaks)
        uses: zricethezav/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# ══════════════════════════════════════════════════════════════════════════════
# Stage 2 — Unit + Integration Tests
# ══════════════════════════════════════════════════════════════════════════════
  test:
    name: 🧪 Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          # Use placeholder secrets for test — no real credentials in CI
          JWT_SECRET: ci-test-secret-not-for-production-32chars
          SUPABASE_URL: ''
          SUPABASE_ANON_KEY: ''
          SUPABASE_SERVICE_KEY: ''
          GEMINI_API_KEY: ''

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

# ══════════════════════════════════════════════════════════════════════════════
# Stage 3 — Docker Build + Container Vulnerability Scan
# ══════════════════════════════════════════════════════════════════════════════
  build-and-scan:
    name: 🐳 Docker Build + Trivy Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_NAME }}:${{ github.sha }}'
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'           # Fail on critical/high CVEs
          ignore-unfixed: true

      - name: Save image as artifact
        if: github.ref == 'refs/heads/main'
        run: docker save ${{ env.IMAGE_NAME }}:${{ github.sha }} | gzip > image.tar.gz

      - name: Upload image artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ github.sha }}
          path: image.tar.gz
          retention-days: 7

# ══════════════════════════════════════════════════════════════════════════════
# Stage 4 — Deploy to Staging (main branch only)
# ══════════════════════════════════════════════════════════════════════════════
  deploy-staging:
    name: 🚀 Deploy → Staging
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.sentinel.litsecure.mw
    steps:
      - uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ github.sha }}

      - name: Deploy to staging server (SSH)
        # Replace with your actual deployment method:
        # - Railway: railway up
        # - Fly.io: fly deploy
        # - VPS SSH: scp + docker load + docker-compose up
        run: |
          echo "Deploying ${{ env.IMAGE_NAME }}:${{ github.sha }} to staging"
          echo "TODO: configure SSH deploy or Railway/Fly.io CLI here"
        # Example SSH deploy:
        # uses: appleboy/ssh-action@v1.0.3
        # with:
        #   host: ${{ secrets.STAGING_HOST }}
        #   username: ${{ secrets.STAGING_USER }}
        #   key: ${{ secrets.STAGING_SSH_KEY }}
        #   script: |
        #     docker load < image.tar.gz
        #     docker-compose up -d

      - name: Smoke test staging
        run: |
          sleep 15  # Wait for container to start
          curl -f https://staging.sentinel.litsecure.mw/api/health || exit 1

# ══════════════════════════════════════════════════════════════════════════════
# Stage 5 — Production Deploy (manual approval gate)
# ══════════════════════════════════════════════════════════════════════════════
  deploy-production:
    name: 🏭 Deploy → Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment:
      name: production            # Requires manual approval in GitHub Environments
      url: https://sentinel.litsecure.mw
    steps:
      - uses: actions/checkout@v4

      - name: Tag release
        run: |
          git tag "v$(node -p "require('./package.json').version")-$(date +%Y%m%d%H%M)"
          git push origin --tags || true

      - name: Deploy to production
        run: |
          echo "Deploying to PRODUCTION — version ${{ github.sha }}"
          echo "TODO: configure production deploy"

      - name: Production health check
        run: |
          sleep 20
          curl -f https://sentinel.litsecure.mw/api/health || exit 1

      - name: Notify on success
        if: success()
        run: echo "✅ Production deployment successful"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "🚨 Production deploy FAILED — initiating rollback"
          echo "TODO: docker rollback or git revert + redeploy"
